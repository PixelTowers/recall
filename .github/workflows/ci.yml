# ABOUTME: CI workflow that runs tests and linting on pull requests.
# ABOUTME: Ensures code quality before merging.

name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Install dependencies
        run: npm ci

      - name: Build for Chrome
        run: npm run build:chrome

      - name: Build for Firefox
        run: npm run build:firefox

      - name: Verify Chrome build output
        run: |
          test -f dist/chrome/manifest.json
          test -f dist/chrome/background.js
          test -f dist/chrome/content.js
          test -f dist/chrome/popup/popup.html
          test -f dist/chrome/options/options.html

      - name: Verify Firefox build output
        run: |
          test -f dist/firefox/manifest.json
          test -f dist/firefox/background.js
          test -f dist/firefox/content.js
          test -f dist/firefox/popup/popup.html
          test -f dist/firefox/options/options.html
