# ABOUTME: Build workflow that runs on pushes to main.
# ABOUTME: Tests, builds, and uploads extension artifacts for both browsers.

name: Build

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  build:
    name: Build & Upload
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Install dependencies
        run: npm ci

      - name: Build for both browsers
        run: npm run build -- --minify

      - name: Upload Chrome extension
        uses: actions/upload-artifact@v4
        with:
          name: recall-chrome
          path: dist/chrome/

      - name: Upload Firefox extension
        uses: actions/upload-artifact@v4
        with:
          name: recall-firefox
          path: dist/firefox/
