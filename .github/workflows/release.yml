# ABOUTME: Workflow that creates GitHub releases with packaged extension artifacts on version tags.
# ABOUTME: Triggered on `v*` tags; includes commented scaffolding for Chrome & Firefox store publishing.

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  build-and-release:
    name: Build & Release
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Install dependencies
        run: npm ci

      - name: Build for both browsers
        run: npm run build -- --minify

      - name: Package Chrome extension
        run: |
          cd dist/chrome
          zip -r ../../recall-chrome-${{ github.ref_name }}.zip .
          cd ../..

      - name: Package Firefox extension
        run: |
          npx web-ext build \
            --source-dir dist/firefox \
            --artifacts-dir . \
            --filename recall-firefox-${{ github.ref_name }}.zip

      - name: Create source code archive
        run: |
          zip -r recall-source-${{ github.ref_name }}.zip . \
            --exclude "node_modules/*" \
            --exclude "dist/*" \
            --exclude "web-ext-artifacts/*" \
            --exclude ".git/*" \
            --exclude "*.zip"

      - name: Upload artifacts for store publishing
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            recall-chrome-${{ github.ref_name }}.zip
            recall-firefox-${{ github.ref_name }}.zip
            recall-source-${{ github.ref_name }}.zip
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            recall-chrome-${{ github.ref_name }}.zip
            recall-firefox-${{ github.ref_name }}.zip
            recall-source-${{ github.ref_name }}.zip
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  # ============================================================================
  # Chrome Web Store Publishing
  # ============================================================================
  publish-chrome:
    name: Publish to Chrome Web Store
    runs-on: ubuntu-latest
    needs: build-and-release
    environment: chrome-store
    steps:
      - uses: actions/checkout@v4

      - name: Download Chrome extension artifact
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts

      - name: Publish to Chrome Web Store
        uses: mobilefirstllc/cws-publish@latest
        with:
          action: 'publish'
          client_id: ${{ secrets.CHROME_CLIENT_ID }}
          client_secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh_token: ${{ secrets.CHROME_REFRESH_TOKEN }}
          extension_id: ${{ secrets.CHROME_EXTENSION_ID }}
          zip_file: recall-chrome-${{ github.ref_name }}.zip

  # ============================================================================
  # Firefox Add-ons (AMO) Publishing
  # ============================================================================
  publish-firefox:
    name: Publish to Firefox Add-ons
    runs-on: ubuntu-latest
    needs: build-and-release
    environment: firefox-store
    steps:
      - uses: actions/checkout@v4

      - name: Download Firefox extension artifact
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts

      - name: Sign & Publish to Firefox Add-ons
        uses: kewisch/action-web-ext@v1
        with:
          cmd: sign
          source: recall-firefox-${{ github.ref_name }}.zip
          channel: listed
          apiKey: ${{ secrets.AMO_SIGN_KEY }}
          apiSecret: ${{ secrets.AMO_SIGN_SECRET }}
          releaseNotes: 'Release notes from GitHub'
