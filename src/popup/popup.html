<!-- ABOUTME: Popup UI for the Recall browser extension toolbar button. -->
<!-- ABOUTME: Lists saved snapshots with restore, delete, and export actions. -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recall</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <header class="header">
      <h1 class="header__title">Recall</h1>
      <button id="settings-btn" class="header__settings" title="Settings">
        &#9881;
      </button>
    </header>

    <button id="save-btn" class="save-btn">Save Current Form</button>

    <div id="snapshot-list" class="snapshot-list"></div>

    <div id="empty-state" class="empty-state" hidden>
      <p>No saved snapshots for this page.</p>
    </div>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
