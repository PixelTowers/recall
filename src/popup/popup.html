<!-- ABOUTME: Popup UI for the Recall browser extension toolbar button. -->
<!-- ABOUTME: Lists saved snapshots with restore, delete, and export actions. -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recall</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <header class="header">
      <h1 class="header__title">Recall</h1>
      <div class="header__actions">
        <button id="view-all-btn" class="header__btn" title="View all saved forms">
          &#128203;
        </button>
        <button id="settings-btn" class="header__btn" title="Settings">
          &#9881;
        </button>
      </div>
    </header>

    <button id="save-btn" class="save-btn">Save Current Form</button>

    <div id="snapshot-list" class="snapshot-list"></div>

    <div id="empty-state" class="empty-state" hidden>
      <p>No saved snapshots for this page.</p>
    </div>

    <footer class="footer">
      <p>Made with <span class="footer-emoji" data-footer-emoji aria-label="love">&#x2764;&#xFE0F;</span> by <a href="https://pixeltowers.io" target="_blank" rel="noopener noreferrer">PixelTowers</a></p>
    </footer>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
